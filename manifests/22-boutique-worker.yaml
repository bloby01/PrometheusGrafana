---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: production
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: bloby01/boutique-worker:v1
          imagePullPolicy: Always
          # --- Chapitre Traces : instrumentation OpenTelemetry AUTOMATIQUE ---
          command: ["opentelemetry-instrument", "python", "app.py"]
          ports:
            - name: metrics
              containerPort: 8083
          env:
            - name: OTEL_SERVICE_NAME
              value: "worker"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: production
  labels:
    app: worker
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: 8083
      targetPort: metrics
