---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: production
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: bloby01/boutique-api:v1
          imagePullPolicy: Always
          # --- Chapitre Traces : instrumentation OpenTelemetry AUTOMATIQUE ---
          command: ["opentelemetry-instrument", "python", "app.py"]
          ports:
            - name: metrics
              containerPort: 8082
          env:
            - name: WORKER_URL
              value: "http://worker:8083"
            - name: OTEL_SERVICE_NAME
              value: "api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: production
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: metrics
      port: 8082
      targetPort: metrics
