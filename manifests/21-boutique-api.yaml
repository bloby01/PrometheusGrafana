---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: production
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: bloby01/boutique-api:v1
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8082
          env:
            - name: WORKER_URL
              value: "http://worker:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: production
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: metrics
      port: 8082
      targetPort: metrics
