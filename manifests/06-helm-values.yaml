# Configuration Helm pour kube-prometheus-stack
# Profil : FORMATION / MINIKUBE (poste de travail, cluster jetable)
#
# Ce fichier est volontairement allege par rapport a une configuration de
# production on-premises : pas de surveillance du control plane (etcd,
# scheduler, controller-manager, kube-proxy) car ces composants ne sont pas
# exposes de la meme facon sur Minikube, ressources reduites, services en
# ClusterIP (acces par port-forward).
#
# Installation :
# helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace \
#   --values manifests/06-helm-values.yaml
#
# Mise a jour :
# helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --values manifests/06-helm-values.yaml

# ==============================================================================
# PROMETHEUS SERVER
# ==============================================================================
prometheus:
  # Acces par port-forward (Minikube n'a pas de LoadBalancer natif).
  service:
    type: ClusterIP

  prometheusSpec:
    # Retention courte : suffisant pour une formation, economise le disque.
    retention: 3d
    retentionSize: "4GB"

    # Ressources adaptees a un poste de formation.
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

    scrapeInterval: "30s"
    scrapeTimeout: "10s"
    evaluationInterval: "30s"

    # Selectors vides : Prometheus decouvre TOUS les ServiceMonitor du cluster,
    # quel que soit leur namespace ou leur label. Pratique en formation.
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleSelector: {}
    ruleNamespaceSelector: {}

# ==============================================================================
# ALERTMANAGER
# ==============================================================================
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

    retention: 120h

# ==============================================================================
# GRAFANA
# ==============================================================================
grafana:
  enabled: true
  adminPassword: "admin"

  # La datasource Prometheus par defaut est definie manuellement plus bas ;
  # on desactive donc celle que le chart creerait automatiquement, sinon
  # deux datasources seraient marquees "default" et Grafana refuserait de
  # demarrer.
  defaultDatasourceEnabled: false

  # Acces par port-forward (pas de LoadBalancer sur Minikube).
  service:
    type: ClusterIP

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Datasource Prometheus declaree explicitement (URL DNS complete, uid stable).
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
        access: proxy
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 30s
          queryTimeout: 60s
          httpMethod: POST
        uid: prometheus

  # Provider de dashboards (permet d'ajouter des dashboards par fichier).
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# ==============================================================================
# COMPOSANTS DE BASE (utiles et legers, on les garde)
# ==============================================================================
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  enabled: true

# ==============================================================================
# CONTROL PLANE
# Sur Minikube, le control plane n'est pas expose comme sur un cluster
# on-premises : on desactive sa surveillance pour eviter des cibles et des
# alertes definitivement rouges. Seuls l'API server, le kubelet et CoreDNS,
# qui fonctionnent sur Minikube, restent actifs.
# ==============================================================================
kubeApiServer:
  enabled: true

kubelet:
  enabled: true
  namespace: kube-system
  serviceMonitor:
    https: true
    insecureSkipVerify: true
    cAdvisor: true
    probes: true
    resource: true
    resourcePath: "/metrics/resource"

coreDns:
  enabled: true

# Composants du control plane non exposes proprement sur Minikube : desactives.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# ==============================================================================
# REGLES D'ALERTING
# On conserve les regles pertinentes sur Minikube et on desactive celles qui
# visent des composants du control plane absents (etcd, scheduler, kube-proxy),
# pour ne pas afficher d'alertes rouges permanentes sans objet.
# ==============================================================================
defaultRules:
  create: true
  rules:
    alertmanager: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    # Desactivees : composants absents sur Minikube
    etcd: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
