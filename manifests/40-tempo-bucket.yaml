# =============================================================================
# Bucket "tempo" dans SeaweedFS — cree via le client S3 standard (AWS CLI)
# =============================================================================
# Tempo 3.0 range ses blocs de traces dans un stockage objet S3. On reutilise le
# SeaweedFS deja deploye (manifests/30-seaweedfs.yaml) en y creant un bucket
# dedie aux traces, distinct du bucket "loki" des logs.
#
#   kubectl apply -f manifests/40-tempo-bucket.yaml
#
# POURQUOI LE CLIENT AWS PLUTOT QUE "weed shell" ?
# La commande "weed shell" est pratique en local, mais lancee depuis un autre pod
# via le service reseau, elle peut rester bloquee sans rendre la main. On utilise
# donc l'API S3 standard, via le client officiel "aws" : c'est le protocole que
# n'importe quel stockage S3-compatible comprend, et c'est ce qu'on ferait en
# production. Robuste et independant des specificites de SeaweedFS.
#
# Le bucket "loki" est cree de la meme facon dans manifests/30-seaweedfs.yaml.
# =============================================================================

---
apiVersion: batch/v1
kind: Job
metadata:
  name: seaweedfs-create-bucket-tempo
  namespace: monitoring
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-bucket
          image: amazon/aws-cli:latest
          # Identifiants S3 injectes depuis le Secret (memes que Loki/Tempo).
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-credentials
                  key: S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-s3-credentials
                  key: S3_SECRET_KEY
            # SeaweedFS ignore la region, mais le client AWS en exige une.
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          # On surcharge l'entrypoint (l'image lance "aws" par defaut) par un
          # shell, pour enchainer l'attente puis la creation.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              ENDPOINT="http://seaweedfs.monitoring:8333"

              echo "Attente de l'endpoint S3 de SeaweedFS..."
              # aws s3 ls renvoie 0 des que l'API S3 repond (meme sans bucket).
              until aws --endpoint-url "$ENDPOINT" s3 ls >/dev/null 2>&1; do
                echo "  S3 pas encore pret, nouvelle tentative dans 3s..."
                sleep 3
              done

              echo "S3 pret. Creation du bucket tempo (idempotent)."
              # "s3 mb" echoue si le bucket existe deja : on neutralise ce cas
              # pour que le Job reussisse meme si le bucket est deja la.
              if aws --endpoint-url "$ENDPOINT" s3 mb s3://tempo 2>/tmp/err; then
                echo "Bucket tempo cree."
              else
                if grep -qi "BucketAlreadyOwnedByYou\|BucketAlreadyExists\|already exists" /tmp/err; then
                  echo "Bucket tempo deja existant : rien a faire."
                else
                  echo "Echec de creation :" ; cat /tmp/err ; exit 1
                fi
              fi

              echo "Verification (liste des buckets) :"
              aws --endpoint-url "$ENDPOINT" s3 ls
