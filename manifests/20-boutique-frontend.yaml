---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: bloby01/boutique-frontend:v1
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8081
          env:
            - name: API_URL
              value: "http://api:8082"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: production
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: metrics
      port: 8081
      targetPort: metrics
