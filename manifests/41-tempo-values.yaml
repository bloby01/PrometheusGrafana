# =============================================================================
# Tempo — mode distribué (microservices), stockage objet SeaweedFS
# =============================================================================
# Chart : grafana-community/tempo-distributed
# Depuis janvier 2026, le chart OSS est publie par la communaute Grafana :
#   helm repo add grafana-community https://grafana-community.github.io/helm-charts
#   helm repo update
#   helm install tempo grafana-community/tempo-distributed \
#     -n monitoring -f manifests/41-tempo-values.yaml
#
# Profil FORMATION / MINIKUBE :
# Mode distribue (chaque fonction de Tempo dans son propre processus), comme en
# production, mais replicas reduits a 1 pour tenir sur un noeud. Le stockage est
# le SeaweedFS deja en place (manifests/30-seaweedfs.yaml), sur le bucket
# "tempo" cree par manifests/40-tempo-bucket.yaml.
#
# Tempo recoit les traces au format OTLP. C'est Alloy qui les lui transmettra
# (chapitre suivant) — exactement comme il transmet les logs a Loki.
# =============================================================================

# -----------------------------------------------------------------------------
# STOCKAGE DES TRACES — SeaweedFS via S3
# -----------------------------------------------------------------------------
storage:
  trace:
    backend: s3
    s3:
      bucket: tempo
      endpoint: seaweedfs.monitoring:8333
      # Identifiants resolus a l'execution depuis le Secret
      # seaweedfs-s3-credentials, injecte en variables d'environnement sur chaque
      # composant (voir extraEnv/extraArgs plus bas). Aucun secret en clair dans
      # ce fichier : c'est la pratique de production.
      access_key: "${S3_ACCESS_KEY}"
      secret_key: "${S3_SECRET_KEY}"
      # OBLIGATOIRE pour un S3-compatible auto-heberge : adressage par chemin.
      forcepathstyle: true
      # Connexion en HTTP (pas de TLS sur SeaweedFS interne).
      insecure: true

# -----------------------------------------------------------------------------
# PROTOCOLES D'INGESTION
# Desactives par defaut : on active OTLP (gRPC et HTTP), le protocole par lequel
# Alloy enverra les traces. Les autres (Jaeger, Zipkin) restent desactives.
# -----------------------------------------------------------------------------
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
  zipkin:
    enabled: false
  jaeger:
    thriftHttp:
      enabled: false

# -----------------------------------------------------------------------------
# COMPOSANTS DU MODE DISTRIBUE
# -----------------------------------------------------------------------------
# INJECTION DES IDENTIFIANTS S3 (pratique de production)
# Les identifiants ne sont jamais en clair : ils viennent du Secret
# seaweedfs-s3-credentials, injectes en variables d'environnement sur chaque
# composant qui accede au stockage, et l'expansion ${VAR} dans la config est
# activee par le flag -config.expand-env=true.
# On definit ces deux reglages une seule fois via des ancres YAML (&), puis on
# les reutilise sur chaque composant (*) pour eviter la repetition.
# -----------------------------------------------------------------------------
_s3_env: &s3Env
  - name: S3_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-credentials
        key: S3_ACCESS_KEY
  - name: S3_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-credentials
        key: S3_SECRET_KEY

_s3_args: &s3Args
  - "-config.expand-env=true"

# -----------------------------------------------------------------------------
# COMPOSANTS DU MODE DISTRIBUE
# Replicas a 1 (formation mononoeud). En production : 3+ par composant.
# distributor, ingester, querier, query-frontend et compactor sont toujours
# installes ; on fixe simplement leur nombre de replicas et leurs ressources.
# Chaque composant recoit l'injection du Secret S3 et le flag d'expansion.
# -----------------------------------------------------------------------------
distributor:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingester:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  # Pas de replication sur un seul exemplaire (mononoeud).
  config:
    replication_factor: 1
  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

querier:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

queryFrontend:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

compactor:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Cache : DESACTIVE proprement.
# Mettre seulement "memcached.enabled: false" retire le pod memcached mais
# laisse la config cliente du cache pointer vers un hote inexistant
# (erreur "tempo-memcached ... no such host"). Pour couper le cache, il faut
# vider la liste des caches. En production, on reactive un memcached dimensionne.
cache:
  caches: []

memcached:
  enabled: false

# MinIO integre au chart : DESACTIVE. On utilise notre SeaweedFS deploye
# separement (manifests/30-seaweedfs.yaml).
minio:
  enabled: false

# Generateur de metriques : laisse desactive pour ce premier deploiement
# (il produit des metriques derivees des traces, sujet avance).
metricsGenerator:
  enabled: false

# La passerelle expose une adresse unique pour l'ingestion et la requete.
# En ClusterIP : acces par port-forward (pas de LoadBalancer sur Minikube).
gateway:
  enabled: true
  service:
    type: ClusterIP

# Retention des traces : 72h, suffisant pour une formation.
compactorConfig:
  compaction:
    block_retention: 72h
