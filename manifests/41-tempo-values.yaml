# =============================================================================
# Tempo 3.0 — mode microservices avec write path Kafka, stockage SeaweedFS
# =============================================================================
# Chart : grafana-community/tempo-distributed
#   helm upgrade --install tempo grafana-community/tempo-distributed \
#     -n monitoring -f manifests/41-tempo-values.yaml
#
# ARCHITECTURE TEMPO 3.0 (nouveaute majeure) :
# Depuis la 3.0, le mode microservices repose sur Kafka comme file d'attente
# durable. Le chemin d'ecriture a ete refondu :
#   - le distributor ecrit les spans dans Kafka (au lieu de les pousser aux
#     ingesters) ;
#   - le block-builder consomme Kafka et ecrit les blocs dans le stockage objet ;
#   - le live-store consomme Kafka et sert les requetes sur les traces recentes ;
#   - un backend-scheduler et un backend-worker remplacent le compactor.
# Les ingesters et le compactor de la 2.x n'existent PLUS. Comme Kafka assure la
# durabilite, Tempo fonctionne en replication 1.
#
# PREREQUIS : un cluster Kafka doit exister (manifests/60-kafka.yaml, via
# l'operateur Strimzi). Bootstrap : tempo-kafka-kafka-bootstrap.monitoring:9092.
#
# PROFIL FORMATION / MINIKUBE : tout au minimum.
#  - 1 seule partition Kafka -> 1 block-builder et 1 live-store (la regle du
#    chart impose : replicas = nombre de partitions) ;
#  - ressources bridees ; caches et minio desactives ; SeaweedFS pour le S3.
#
# EN PRODUCTION (voir encart du cours) : plusieurs partitions Kafka, autant de
# block-builders et live-stores, composants dimensionnes, stockage objet dedie.
# =============================================================================

# -----------------------------------------------------------------------------
# STOCKAGE DES TRACES — SeaweedFS via S3 (inchange par rapport a la 2.x)
# -----------------------------------------------------------------------------
storage:
  trace:
    backend: s3
    s3:
      bucket: tempo
      endpoint: seaweedfs.monitoring:8333
      access_key: "${S3_ACCESS_KEY}"
      secret_key: "${S3_SECRET_KEY}"
      forcepathstyle: true
      insecure: true

# -----------------------------------------------------------------------------
# WRITE PATH KAFKA (nouveaute 3.0)
# Le distributor ecrit dans ce Kafka ; block-builder et live-store y consomment.
# -----------------------------------------------------------------------------
ingest:
  kafka:
    # Service bootstrap cree par Strimzi pour le cluster "tempo-kafka".
    address: "tempo-kafka-kafka-bootstrap.monitoring:9092"
    topic: tempo-traces
    auto_create_topic_enabled: true
    # UNE seule partition (maquette). block-builder et live-store devront avoir
    # exactement ce meme nombre de replicas.
    auto_create_topic_default_partitions: 1

# -----------------------------------------------------------------------------
# INJECTION DES IDENTIFIANTS S3 (pratique de production, comme en 2.x)
# Chaque composant qui accede au stockage recoit le Secret + le flag d'expansion.
# En 3.0, les composants "stockage" sont : distributor (non, il ecrit Kafka),
# block-builder, live-store, backend-scheduler, backend-worker, querier,
# query-frontend. On applique l'injection largement via les ancres.
# -----------------------------------------------------------------------------
_s3_env: &s3Env
  - name: S3_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-credentials
        key: S3_ACCESS_KEY
  - name: S3_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: seaweedfs-s3-credentials
        key: S3_SECRET_KEY

_s3_args: &s3Args
  - "-config.expand-env=true"

# -----------------------------------------------------------------------------
# PROTOCOLES D'INGESTION — OTLP active (Alloy envoie les traces en OTLP)
# -----------------------------------------------------------------------------
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
  zipkin:
    enabled: false
  jaeger:
    thriftHttp:
      enabled: false

# -----------------------------------------------------------------------------
# COMPOSANTS
# -----------------------------------------------------------------------------

# Distributor : recoit les traces (OTLP) et les ecrit dans Kafka.
distributor:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Block-builder : consomme Kafka, ecrit les blocs dans SeaweedFS.
# replicas = nombre de partitions Kafka (ici 1).
blockBuilder:
  enabled: true
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Live-store : consomme Kafka, sert les traces recentes.
# replicas = nombre de partitions Kafka (ici 1).
liveStore:
  enabled: true
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Backend-scheduler : planifie la maintenance des blocs (remplace le compactor).
backendScheduler:
  enabled: true
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# Backend-worker : execute la maintenance planifiee.
backendWorker:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# Querier : lit les traces (depuis le stockage et les live-stores).
querier:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Query-frontend : ordonnance les requetes.
queryFrontend:
  replicas: 1
  extraArgs: *s3Args
  extraEnv: *s3Env
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# Cache desactive proprement (comme en 2.x).
cache:
  caches: []

memcached:
  enabled: false

# MinIO integre desactive : on utilise SeaweedFS.
minio:
  enabled: false

# Generateur de metriques : laisse desactive pour ce premier deploiement.
metricsGenerator:
  enabled: false

# Passerelle : point d'entree unique, en ClusterIP (acces par port-forward).
gateway:
  enabled: true
  service:
    type: ClusterIP
