# =============================================================================
# Loki — mode microservices (Distributed), stockage objet SeaweedFS
# =============================================================================
# Chart : grafana-community/loki (version 13.x, appVersion 3.7.x)
# Depuis mars 2026, le chart OSS est publie par la communaute :
#   helm repo add grafana-community https://grafana-community.github.io/helm-charts
#   helm repo update
#   helm install loki grafana-community/loki -n monitoring -f manifests/31-loki-values.yaml
#
# Profil FORMATION / MINIKUBE :
# Le mode microservices reflète une architecture de production (chaque fonction
# de Loki tourne dans son propre processus), mais les replicas sont reduits a 1
# pour tenir sur un Minikube mononoeud. En production, on augmente les replicas
# et on active la replication multi-zone pour la disponibilite.
#
# Le stockage objet est SeaweedFS (deploye par manifests/30-seaweedfs.yaml),
# joignable en S3 sur http://seaweedfs.monitoring:8333, bucket "loki".
# =============================================================================

# Active le mode microservices (= Distributed).
deploymentMode: Distributed

loki:
  # Pas de multi-tenant en formation : simplifie les requetes (pas d'en-tete
  # X-Scope-OrgID a fournir).
  auth_enabled: false

  # Schema de stockage : TSDB + objet S3, schema v13 (format courant).
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  ingester:
    chunk_encoding: snappy

  querier:
    max_concurrent: 2

  pattern_ingester:
    enabled: true

  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 72h   # 3 jours, suffisant pour une formation

  # Un seul exemplaire de chaque donnee (pas de replication) : adapte au
  # mononoeud. En production, replication_factor: 3.
  commonConfig:
    replication_factor: 1

  # ---------------------------------------------------------------------------
  # Stockage objet : connexion a SeaweedFS via son API S3.
  # ---------------------------------------------------------------------------
  storage:
    type: s3
    # On reutilise le bucket unique "loki" pour les chunks et le ruler.
    # En production, on separe en buckets distincts avec des noms uniques.
    bucketNames:
      chunks: loki
      ruler: loki
    s3:
      # Endpoint S3 de SeaweedFS (service interne au cluster).
      endpoint: seaweedfs.monitoring:8333
      # Identifiants definis dans le Secret seaweedfs-s3-credentials,
      # injectes via variables d'environnement (voir extraEnvFrom plus bas).
      accessKeyId: ${S3_ACCESS_KEY}
      secretAccessKey: ${S3_SECRET_KEY}
      # OBLIGATOIRE pour un S3-compatible auto-heberge (SeaweedFS, MinIO) :
      # adressage par chemin (http://endpoint/bucket) et non par sous-domaine.
      s3ForcePathStyle: true
      # Connexion en HTTP (pas de TLS sur SeaweedFS interne).
      insecure: true
      region: us-east-1   # valeur factice, requise par le client S3

# Permet d'utiliser ${VAR} dans la config et injecte les identifiants S3
# depuis le Secret cree avec SeaweedFS.
global:
  extraEnvFrom:
    - secretRef:
        name: seaweedfs-s3-credentials
  extraArgs:
    - "-config.expand-env=true"

# =============================================================================
# COMPOSANTS DU MODE MICROSERVICES
# Replicas reduits a 1 (formation mononoeud). En production : 3+ par composant.
# =============================================================================
ingester:
  replicas: 1
  # Replication multi-zone DESACTIVEE : sinon le chart cree 3 StatefulSets
  # (un par zone) et exige le sous-chart rollout-operator. Inutile en mononoeud.
  zoneAwareReplication:
    enabled: false

querier:
  replicas: 1

queryFrontend:
  replicas: 1

queryScheduler:
  replicas: 1

distributor:
  replicas: 1

compactor:
  replicas: 1

indexGateway:
  replicas: 1

# Composants bloom (acceleration de recherche avancee) : non necessaires en
# formation, desactives pour alleger.
bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0

# Modes de deploiement concurrents : explicitement a zero pour ne garder que
# le mode Distributed.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
singleBinary:
  replicas: 0

# La passerelle NGINX expose l'API Loki et route vers les bons composants.
# En ClusterIP : on y accede par port-forward (pas de LoadBalancer sur Minikube).
gateway:
  service:
    type: ClusterIP

# MinIO integre au chart : DESACTIVE. On utilise notre SeaweedFS deploye
# separement (manifests/30-seaweedfs.yaml).
minio:
  enabled: false

# Loki Canary : sonde qui verifie en continu la sante de la chaine d'ingestion.
# Conserve, c'est leger et pedagogiquement interessant.
lokiCanary:
  enabled: true

# Caches memcached : reduits a un exemplaire chacun.
chunksCache:
  replicas: 1
resultsCache:
  replicas: 1
